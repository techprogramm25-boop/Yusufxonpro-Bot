<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusufxonpro Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; text-align: center; padding: 20px; }
        .item { background: #1e1e1e; border: 1px solid #0088cc; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .price { color: #00ff00; font-weight: bold; font-size: 1.2em; }
        button { background: #0088cc; color: white; border: none; padding: 10px 20px; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; }
        #loading { font-size: 24px; margin-top: 50%; }
    </style>
</head>
<body>
    <div id="loading">Yusufxonpro uz...<br>2 soniya kuting...</div>
    <div id="main" style="display:none;">
        <h2>Bot Do'koni</h2>
        <div class="item">
            <h3>📚 Matematika (1-11 sinf)</h3>
            <p class="price">17,000 so'm</p>
            <button onclick="buy('math')">Sotib olish</button>
        </div>
        <div class="item">
            <h3>🛡 Reklama Tozalovchi</h3>
            <p class="price">17,000 so'm</p>
            <button onclick="buy('cleaner')">Sotib olish</button>
        </div>
        <div class="item">
            <h3>🔢 Kalkulyator Bot</h3>
            <p class="price">17,000 so'm</p>
            <button onclick="buy('calc')">Sotib olish</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main').style.display = 'block';
        }, 2000);

        function buy(type) {
            tg.sendData(JSON.stringify({action: "buy", service: type}));
            tg.close();
        }
    </script>
</body>
</html>
