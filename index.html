<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusufxonpro Builder</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --p: #00f2fe; --s: #4facfe; --bg: #0d0d0e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Glassmorphism Design */
        .card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); 
            border-radius: 24px; 
            padding: 25px; 
            width: 85%; 
            margin: 15px 0; 
            text-align: center;
            transition: 0.3s;
        }
        .card:active { transform: scale(0.95); }
        
        h1 { margin-top: 30px; background: linear-gradient(var(--p), var(--s)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 28px; }
        h3 { margin: 10px 0; color: var(--p); }
        p { color: #aaa; font-size: 14px; }
        .price { display: block; margin: 15px 0; color: #00ff88; font-weight: bold; font-size: 18px; }
        
        .btn { 
            background: linear-gradient(45deg, var(--s), var(--p)); 
            border: none; color: white; padding: 15px; width: 100%; 
            border-radius: 15px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }
    </style>
</head>
<body>

    <h1>Yusufxonpro Shop</h1>

    <div class="card">
        <h3>🛡 Reklama Tozalovchi</h3>
        <p>Guruhlarni 24/7 reklamadan tozalab turadi.</p>
        <span class="price">17,000 UZS</span>
        <button class="btn" onclick="order('Reklama Tozalovchi')">Sotib olish</button>
    </div>

    <div class="card">
        <h3>📚 Matematika O'yini</h3>
        <p>1-11 sinf savollari va 27s taymer.</p>
        <span class="price">17,000 UZS</span>
        <button class="btn" onclick="order('Matematika Oyini')">Sotib olish</button>
    </div>

    <div class="card">
        <h3>🔢 Kalkulyator Bot</h3>
        <p>Professional hisob-kitob boti.</p>
        <span class="price">17,000 UZS</span>
        <button class="btn" onclick="order('Kalkulyator')">Sotib olish</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function order(service) {
            // Botga ma'lumot yuborish (JUDA MUHIM)
            tg.sendData(JSON.stringify({service: service}));
            // Saytni yopish
            tg.close();
        }
    </script>
</body>
</html>
